name: Test OIDC

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::630287362492:role/github-sam-deploy-role
          aws-region: eu-north-1

      - name: Test identity
        run: aws sts get-caller-identity
